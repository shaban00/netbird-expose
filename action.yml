name: 'NetBird Expose Runner'
description: "Expose your application through the NetBird reverse proxy"
author: 'Shaban Mohammedsaani Hassan (shaban00)'

branding:
  icon: 'globe'
  color: 'orange'

inputs:
  dockerfile:
    description: 'Path to the Dockerfile used to build the service. Ignored when a compose file is present.'
    required: false
    default: 'Dockerfile'
  docker-compose:
    description: 'Path to the docker-compose file. Takes precedence over the Dockerfile when this file exists.'
    required: false
    default: 'docker-compose.yml'
  app-env:
    description: 'Environment variables to inject into the service as KEY=VALUE pairs, one per line (.env format; lines starting with # are ignored).'
    required: false
  port:
    description: 'Local port the service listens on (the target port to expose).'
    required: true
  protocol:
    description: 'Protocol to expose the service over: http | https | tcp | udp | tls.'
    required: false
    default: 'http'
  expose-duration:
    description: 'How long to keep the service exposed before automatic teardown. Accepts a number of seconds (e.g. 120) or a value suffixed with s/m/h/d (e.g. 30s, 10m, 1h, 5d).'
    required: false
    default: '5m'
  custom-domain:
    description: 'Custom domain for the exposed service. Must already be configured and verified on your account.'
    required: false
  external-port:
    description: 'Public-facing external port on the proxy cluster for L4 services. Auto-assigned on shared cloud clusters.'
    required: false
  name-prefix:
    description: 'Readable prefix for the generated service subdomain.'
    required: false
  password:
    description: 'Password-protect the exposed service.'
    required: false
  pin:
    description: 'Protect the exposed service with a 6-digit PIN.'
    required: false
  user-groups:
    description: 'Restrict access to specific SSO user groups, comma-separated.'
    required: false
  allow-ssh:
    description: 'Enable NetBird SSH access to the runner before exposing. Starts the embedded SSH server with root and no SSH-layer auth, so access is gated only by your NetBird policy. Default false.'
    required: false
    default: 'false'
  mask-url:
    description: >-
      Mask the exposed URL in logs (shows only scheme + first/last 3 chars, e.g. https://abc***xyz). Set to false to print the full URL.
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Expose
      shell: bash
      env:
        DOCKERFILE: ${{ inputs.dockerfile }}
        DOCKER_COMPOSE: ${{ inputs.docker-compose }}
        APP_ENV: ${{ inputs.app-env }}
        PORT: ${{ inputs.port }}
        PROTOCOL: ${{ inputs.protocol }}
        EXPOSE_DURATION: ${{ inputs.expose-duration }}
        CUSTOM_DOMAIN: ${{ inputs.custom-domain }}
        EXTERNAL_PORT: ${{ inputs.external-port }}
        NAME_PREFIX: ${{ inputs.name-prefix }}
        PASSWORD: ${{ inputs.password }}
        PIN: ${{ inputs.pin }}
        USER_GROUPS: ${{ inputs.user-groups }}
        ALLOW_SSH: ${{ inputs.allow-ssh }}
        MASK_URL: ${{ inputs.mask-url }}
      run: bash "${{ github.action_path }}/scripts/expose.sh"